<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/styles.css">
    <title>Garagem MVC</title>
</head>

<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand-icon">G</div>
            <div>
                <strong>Garagem MVC</strong>
                <span>Controle de estacionamento</span>
            </div>
    </div>
    <!--Barra de navegação-->
    <nav class="menu" aria-label="Menu Principal">
        <button class="menu-item active" data-section="dashboard">Dashboard</button>
        <button class="menu-item" data-section="clientes">Clientes</button>
        <button class="menu-item" data-section="veiculos">Veiculos</button>
        <button class="menu-item" data-section="vagas">Vagas</button>
        <button class="menu-item" data-section="movitentacoes">Movimentações</button>
    </nav>

    <div class="sidebar-footer">
        <span id="clock">--:--</span>
        <small>Node.js + mysql + MVC</small>
    </div>

    <main class="content">
        <header class="topbar">
            <div>
                <p class="eyebrow">Sistema de Garagem</p>
                <h1>Clientes, Veículos, vagas e movimentações</h1>
            </div>
            <button id="btnAtualizar" class="btn secondary" type="button">Atualizar dados</button>
        </header>

        <div id="toast" class="toast" role="status" aria-live="polite"></div>

        <section id="dashboard" class="pahe-section active">
            <div class="card-grid">
                <article class="stat-card">
                    <span>Clientes</span>
                    <strong id="cardClientes">0</strong>
                    <small>Pessoas cadatradas</small>
                </article>
                 <article class="stat-card">
                    <span>Veículos</span>
                    <strong id="cardVeiculos">0</strong>
                    <small>Placas cadatradas</small>
                </article>
                 </article>
                 <article class="stat-card">
                    <span>Vagas livres</span>
                    <strong id="cardVagasLivres">0</strong>
                    <small>disponiveis agora</small>
                </article>
                 </article>
                 <article class="stat-card highlight">
                    <span></span>
                    <strong id="cardVeiculos">0</strong>
                    <small>Veículos cadatradas</small>
                </article>

            </div>
        </section>
    </main>

    </aside>
    </div>

</body>

</html>
